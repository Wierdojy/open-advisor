<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Open Advisor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-app-bar">
        <h1 id="workspace-title" class="brand-title">Open Advisor</h1>
        <button id="reset-data" class="button button-ghost small" type="button">Reset demo</button>
      </header>

      <main class="main-shell">
        <section class="status-strip" aria-label="System status">
          <div class="status-pill">
            <span class="status-dot"></span>
            <span id="status-label">Connecting</span>
          </div>
          <span class="meta">Static demo</span>
        </section>

        <section class="metric-strip" aria-label="Current workspace totals">
          <article class="metric">
            <div class="panel-label">Tracked assets</div>
            <div class="metric-value" id="metric-assets">--</div>
          </article>
          <article class="metric">
            <div class="panel-label">Open reminders</div>
            <div class="metric-value" id="metric-reminders">--</div>
          </article>
          <article class="metric">
            <div class="panel-label">Digest items</div>
            <div class="metric-value" id="metric-inbox">--</div>
          </article>
          <article class="metric">
            <div class="panel-label">Research reports</div>
            <div class="metric-value" id="metric-research">--</div>
          </article>
        </section>

        <section id="view-overview" class="view active-view"></section>
        <section id="view-portfolio" class="view"></section>
        <section id="view-themes" class="view"></section>
        <section id="view-events" class="view"></section>
        <section id="view-research" class="view"></section>
      </main>

      <nav id="nav" class="bottom-nav" aria-label="Primary"></nav>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
