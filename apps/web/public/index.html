<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Advisor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-view="dashboard">
    <div class="app-shell">
      <header class="top-app-bar">
        <div>
          <div class="meta">Open Advisor</div>
          <h1 id="workspace-title" class="brand-title">Open Advisor</h1>
        </div>
        <button id="open-settings" class="icon-button" type="button" aria-label="Open settings">
          <span class="material-symbols-outlined">tune</span>
        </button>
      </header>

      <main class="main-shell">
        <section class="status-strip">
          <div class="status-pill">
            <span class="status-dot"></span>
            <span id="status-label">Loading</span>
          </div>
          <div id="status-meta" class="meta">Initializing workspace</div>
        </section>

        <section id="view-dashboard" class="view active-view"></section>
        <section id="view-inbox" class="view"></section>
        <section id="view-research" class="view"></section>
        <section id="view-chat" class="view"></section>
      </main>

      <nav id="nav" class="bottom-nav" aria-label="Primary navigation"></nav>
    </div>

    <div id="settings-modal" class="modal-shell hidden" aria-hidden="true">
      <button class="modal-backdrop" data-close-settings type="button" aria-label="Close settings"></button>
      <section class="modal-card">
        <div class="panel-header">
          <div>
            <div class="panel-label">Workspace settings</div>
            <h2 class="panel-title">Preferences</h2>
          </div>
          <button id="close-settings" class="icon-button" type="button" aria-label="Close settings">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>

        <form id="settings-form" class="form-grid">
          <input class="field" name="displayName" placeholder="Workspace name" />

          <label class="toggle-row">
            <span>Notifications</span>
            <input type="checkbox" name="notifications" />
          </label>
          <label class="toggle-row">
            <span>Price alerts</span>
            <input type="checkbox" name="priceAlerts" />
          </label>
          <label class="toggle-row">
            <span>IPO alerts</span>
            <input type="checkbox" name="ipoAlerts" />
          </label>
          <label class="toggle-row">
            <span>Compact mode</span>
            <input type="checkbox" name="compactMode" />
          </label>

          <div class="form-actions split-actions">
            <button id="reset-data" class="button button-ghost" type="button">Reset demo</button>
            <button class="button" type="submit">Save settings</button>
          </div>
        </form>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
