<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Open Advisor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-app-bar">
        <div>
          <div class="eyebrow">Identity based investing</div>
          <h1 id="workspace-title" class="brand-title">Open Advisor</h1>
        </div>
        <button id="open-settings" class="icon-button" type="button" aria-label="Open settings">
          <span class="material-symbols-outlined">settings</span>
        </button>
      </header>

      <main class="main-shell">
        <section class="status-strip" aria-label="System status">
          <div class="status-pill">
            <span class="status-dot"></span>
            <span id="status-label">Connecting</span>
          </div>
          <span class="meta" id="status-meta">Live market copilot</span>
        </section>

        <section id="view-dashboard" class="view active-view"></section>
        <section id="view-inbox" class="view"></section>
        <section id="view-research" class="view"></section>
        <section id="view-chat" class="view"></section>
      </main>

      <nav id="nav" class="bottom-nav" aria-label="Primary"></nav>
    </div>

    <div id="settings-modal" class="modal-shell hidden" aria-hidden="true">
      <div class="modal-backdrop" data-close-settings="true"></div>
      <section class="modal-card">
        <div class="panel-header">
          <div>
            <div class="panel-label">Settings</div>
            <h2 class="panel-title">Workspace preferences</h2>
          </div>
          <button id="close-settings" class="icon-button" type="button" aria-label="Close settings">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <form id="settings-form" class="form-grid">
          <input class="field" name="displayName" placeholder="Advisor name" />
          <label class="toggle-row">
            <span>Real-time article notifications</span>
            <input type="checkbox" name="notifications" />
          </label>
          <label class="toggle-row">
            <span>Price action alerts</span>
            <input type="checkbox" name="priceAlerts" />
          </label>
          <label class="toggle-row">
            <span>IPO and listing alerts</span>
            <input type="checkbox" name="ipoAlerts" />
          </label>
          <label class="toggle-row">
            <span>Compact mode</span>
            <input type="checkbox" name="compactMode" />
          </label>
          <div class="form-actions split-actions">
            <button id="reset-data" class="button button-ghost" type="button">Reset demo</button>
            <button class="button" type="submit">Save settings</button>
          </div>
        </form>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
